name: Build & Publish Docker image

on:
  # Runs on every push to master (including a merged PR)
  push:
    branches: [ "master" ]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

env:
  # GITHUB_TOKEN can only publish under the repo owner's namespace (lowercase for GHCR)
  IMAGE: ghcr.io/diaman05/weathermessagebot

jobs:
  build-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read version from pyproject
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: DockerFile
          # amd64 + arm64 so it runs on a PC and on an ARM server (e.g. a Raspberry Pi)
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:${{ github.sha }}
          # Cache layers (pip deps) between runs
          cache-from: type=gha
          cache-to: type=gha,mode=max
